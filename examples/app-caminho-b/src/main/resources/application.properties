# ===========================================================================
# embabel-clj — Slice 0 (Caminho B + OpenRouter)
# ===========================================================================
# Servlet (Tomcat embarcado): o starter-web segura a JVM viva e expoe o
# @RestController AgentController. Sem isto o app (web-application-type=none)
# encerraria assim que o CommandLineRunner retornasse.
spring.main.web-application-type=servlet
spring.main.banner-mode=off
server.port=8090

# --- OpenRouter (OpenAI-compativel) -----------------------------------------
# O framework le primeiro os envs OPENAI_BASE_URL / OPENAI_API_KEY; este
# ambiente NAO tem OPENAI_API_KEY (tem OPENROUTER_APIKEY). Por isso setamos as
# PROPRIEDADES, lendo a chave via placeholder do env OPENROUTER_APIKEY.
embabel.agent.platform.models.openai.base-url=https://openrouter.ai/api/v1
embabel.agent.platform.models.openai.api-key=${OPENROUTER_APIKEY}
embabel.agent.platform.models.openai.max-attempts=5
embabel.agent.platform.models.openai.backoff-millis=3000

# LLM default: um slug OpenRouter registrado (por NOME) no
# src/main/resources/models/openai-models.yml (que sobrescreve o YAML do jar).
# NOTA (Slice 0): os slugs anthropic/claude-3.7-sonnet e claude-3.5-sonnet
# retornam 404 nesta conta OpenRouter (modelos Anthropic nao habilitados na
# data-policy do OpenRouter, ou id diferente). openai/gpt-4o-mini foi verificado
# respondendo. Quando habilitar Claude no OpenRouter, troque o default aqui.
embabel.models.default-llm=openai/gpt-4o-mini

# Headers de atribuicao do OpenRouter (prefixo REAL lido pelo Embabel:
# embabel.agent.platform.models.options.http-headers, campo httpHeaders de
# LlmOptionsProperties).
embabel.agent.platform.models.options.http-headers.HTTP-Referer=https://github.com/jpedr/agendas
embabel.agent.platform.models.options.http-headers.X-Title=agendas-embabel

logging.level.root=WARN
logging.level.com.embabel=INFO
