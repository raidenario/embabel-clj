# OVERRIDE do models/openai-models.yml default do starter-openai: este arquivo
# (resources/ do SEU app) vence no classpath e registra slugs do OpenRouter.
# 'name' == o id que :embabel.models.default-llm / :llm referenciam (byName).
models:
  - name: "openai/gpt-4o-mini"
    model_id: "openai/gpt-4o-mini"
    display_name: "GPT-4o mini (OpenRouter)"
    # baixo de propósito: o OpenRouter PRÉ-AUTORIZA max_tokens contra o saldo
    # (16384 num saldo baixo = 402 antes de gerar 1 token); o mapa EDN de
    # insights precisa de ~500
    max_tokens: 1536
    temperature: 0.7
    pricing_model:
      usd_per1m_input_tokens: 0.15
      usd_per1m_output_tokens: 0.60

  - name: "openai/gpt-4o"
    model_id: "openai/gpt-4o"
    display_name: "GPT-4o (OpenRouter, visão)"
    # baixo de propósito: o OpenRouter PRÉ-AUTORIZA max_tokens contra o saldo
    # (16384 num saldo baixo = 402 antes de gerar 1 token); o mapa EDN de
    # insights precisa de ~500
    max_tokens: 1536
    temperature: 0.7
    pricing_model:
      usd_per1m_input_tokens: 2.5
      usd_per1m_output_tokens: 10.0
